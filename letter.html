<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>來自 Kuromi 的信</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            scrollbar-width: none;
            -ms-overflow-style: none;
            min-height: 100vh;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; }

        body {
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 35%),
                linear-gradient(135deg, #32193d 0%, #7b3f78 42%, #f06795 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .letter-img {
            max-width: min(560px, 92vw);
            width: 100%;
            display: block;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.45);
            animation: reveal 0.8s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(40px) scale(0.94); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .back-link {
            margin-top: 28px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            transition: color 180ms ease;
        }

        .back-link:hover { color: #ffd7ea; }
    </style>
</head>
<body>
    <img class="letter-img" src="img/kuromi-letter.png" alt="來自 Kuromi 的信">
    <a class="back-link" href="second.html">← 返回兌換券</a>
</body>
</html>
