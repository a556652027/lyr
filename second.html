<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: #fff;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.18), transparent 35%),
                linear-gradient(135deg, #32193d 0%, #7b3f78 42%, #f06795 100%);
        }

        .card {
            width: min(760px, 100%);
            padding: 40px 28px;
            border-radius: 28px;
            text-align: center;
            background: rgba(24, 9, 30, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.24);
            box-shadow: 0 26px 70px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
        }

        .figure {
            width: min(280px, 70vw);
            aspect-ratio: 1;
            margin: 0 auto 24px;
            background: url('img/kuromi.png') center / contain no-repeat;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.28));
        }

        .eyebrow {
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: #ffd7ea;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.6rem);
            margin-bottom: 14px;
        }

        p {
            max-width: 560px;
            margin: 0 auto;
            font-size: 1.05rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.88);
        }

        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }

        .primary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 30px;
            border-radius: 999px;
            background: linear-gradient(135deg, #fff3f8 0%, #ffd7ea 100%);
            color: #53233d;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.24);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.28);
        }

        @media (max-width: 768px) {
            .card {
                padding: 32px 22px;
            }

            p {
                font-size: 1rem;
            }

            .primary-btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="figure" aria-hidden="true"></div>
        <p class="eyebrow">Page 2</p>
        <h1>You made it.</h1>
        <p>
            This is the second page opened from the bottom interaction.
            You can replace this section with any content you want next.
        </p>
        <div class="actions">
            <a class="primary-btn" href="index.html">Back Home</a>
        </div>
    </main>
</body>
</html>
